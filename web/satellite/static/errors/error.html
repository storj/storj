<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ .StatusCode }} | {{ .BrandName }}</title>
    <link rel="stylesheet" type="text/css" href="/static/static/errors/error.css">
    <style>
        .button {
            background-color: {{ .PrimaryColor }};
        }
        .button:hover {
            filter: brightness(0.9);
        }
    </style>
</head>
<body>
    <div class="error-area">
        <a class="logo-wrapper" href="{{ .HomepageURL }}">
            <img class="logo" src="{{ .LogoURL }}" alt="{{ .BrandName }} logo" />
		</a>
        <div class="container">
            <h1 class="title">{{ .StatusCode }}</h1>
            <h2 class="subtitle">
                {{- if eq .StatusCode 400 -}}
                    Bad request.
                {{- else if eq .StatusCode 500 -}}
                    Internal server error.
                {{- else -}}
                    An error occurred.
                {{- end -}}
            </h2>
            <a href="{{ .HomepageURL }}" class="button">Go to homepage</a>
        </div>
    </div>
</body>
</html>
